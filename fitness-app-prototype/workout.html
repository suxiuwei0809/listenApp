<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身APP - 运动记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #16213e;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #e94560, #ff6b35);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .add-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #e94560, #ff6b35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }

        /* 时间筛选 */
        .time-filter {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #0f3460;
        }

        .time-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .time-btn.active {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        /* 统计卡片 */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-card {
            background: #0f3460;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #e94560;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        /* 图表区域 */
        .chart-section {
            padding: 15px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .chart-container {
            background: #0f3460;
            border-radius: 12px;
            padding: 20px;
        }

        .chart-bars {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 120px;
        }

        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .bar {
            width: 20px;
            background: linear-gradient(180deg, #e94560, #ff6b35);
            border-radius: 4px 4px 0 0;
            margin-bottom: 6px;
            transition: height 0.5s;
        }

        .bar-label {
            font-size: 10px;
            color: #888;
        }

        /* 运动类型筛选 */
        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow-x: auto;
        }

        .filter-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            background: #0f3460;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #e94560;
        }

        /* 运动列表 */
        .workout-list {
            padding: 0 15px;
            margin-bottom: 120px;
        }

        .workout-card {
            background: #0f3460;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .workout-card:hover {
            transform: translateX(5px);
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .workout-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e94560, #ff6b35);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .workout-info {
            flex: 1;
            margin-left: 12px;
        }

        .workout-name {
            font-size: 16px;
            font-weight: 600;
        }

        .workout-date {
            font-size: 12px;
            color: #aaa;
        }

        .workout-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .workout-stat {
            font-size: 12px;
            color: #888;
        }

        .workout-stat strong {
            color: #fff;
        }

        /* 导航栏 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            cursor: pointer;
        }

        .nav-item.active {
            color: #e94560;
        }

        .nav-item span {
            font-size: 10px;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="back-btn" onclick="goToHome()">←</div>
            <h1>运动记录</h1>
        </header>

        <!-- 时间筛选 -->
        <div class="time-filter">
            <button class="time-btn" onclick="setTimeFilter('day')">今日</button>
            <button class="time-btn active" onclick="setTimeFilter('week')">本周</button>
            <button class="time-btn" onclick="setTimeFilter('month')">本月</button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-cards" id="statsCards">
            <div class="stat-card">
                <div class="stat-value">8</div>
                <div class="stat-label">运动次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">5.5h</div>
                <div class="stat-label">运动时长</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">1,890</div>
                <div class="stat-label">消耗(kcal)</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="chart-section">
            <div class="chart-title">📈 运动趋势</div>
            <div class="chart-container">
                <div class="chart-bars" id="chartBars">
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 40%;"></div>
                        <div class="bar-label">周一</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 60%;"></div>
                        <div class="bar-label">周二</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 30%;"></div>
                        <div class="bar-label">周三</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 80%;"></div>
                        <div class="bar-label">周四</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 70%;"></div>
                        <div class="bar-label">周五</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 90%;"></div>
                        <div class="bar-label">周六</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 50%;"></div>
                        <div class="bar-label">周日</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 运动类型筛选 -->
        <div class="filter-bar">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">跑步</button>
            <button class="filter-btn">力量训练</button>
            <button class="filter-btn">瑜伽</button>
            <button class="filter-btn">有氧</button>
        </div>

        <!-- 运动列表 -->
        <div class="workout-list">
            <div class="workout-card">
                <div class="workout-header">
                    <div style="display: flex; align-items: center;">
                        <div class="workout-icon">🏃</div>
                        <div class="workout-info">
                            <div class="workout-name">户外跑步</div>
                            <div class="workout-date">今天 18:30</div>
                        </div>
                    </div>
                    <span style="color: #4facfe;">完成</span>
                </div>
                <div class="workout-stats">
                    <div class="workout-stat">时长 <strong>45分钟</strong></div>
                    <div class="workout-stat">距离 <strong>5.2km</strong></div>
                    <div class="workout-stat">消耗 <strong>320kcal</strong></div>
                </div>
            </div>

            <div class="workout-card">
                <div class="workout-header">
                    <div style="display: flex; align-items: center;">
                        <div class="workout-icon">💪</div>
                        <div class="workout-info">
                            <div class="workout-name">力量训练</div>
                            <div class="workout-date">昨天 20:00</div>
                        </div>
                    </div>
                    <span style="color: #4facfe;">完成</span>
                </div>
                <div class="workout-stats">
                    <div class="workout-stat">时长 <strong>60分钟</strong></div>
                    <div class="workout-stat">组数 <strong>12组</strong></div>
                    <div class="workout-stat">消耗 <strong>280kcal</strong></div>
                </div>
            </div>

            <div class="workout-card">
                <div class="workout-header">
                    <div style="display: flex; align-items: center;">
                        <div class="workout-icon">🧘</div>
                        <div class="workout-info">
                            <div class="workout-name">瑜伽</div>
                            <div class="workout-date">前天 08:00</div>
                        </div>
                    </div>
                    <span style="color: #4facfe;">完成</span>
                </div>
                <div class="workout-stats">
                    <div class="workout-stat">时长 <strong>30分钟</strong></div>
                    <div class="workout-stat">消耗 <strong>150kcal</strong></div>
                </div>
            </div>

            <div class="workout-card">
                <div class="workout-header">
                    <div style="display: flex; align-items: center;">
                        <div class="workout-icon">🚴</div>
                        <div class="workout-info">
                            <div class="workout-name">室内骑行</div>
                            <div class="workout-date">3天前</div>
                        </div>
                    </div>
                    <span style="color: #4facfe;">完成</span>
                </div>
                <div class="workout-stats">
                    <div class="workout-stat">时长 <strong>40分钟</strong></div>
                    <div class="workout-stat">距离 <strong>15km</strong></div>
                    <div class="workout-stat">消耗 <strong>290kcal</strong></div>
                </div>
            </div>
        </div>

        <div class="add-btn" onclick="showAddWorkout()">+</div>

        <div class="nav-bar">
            <div class="nav-item" onclick="goToHome()">
                <span>🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item active">
                <span>🏃</span>
                <span>运动</span>
            </div>
            <div class="nav-item" onclick="goToPlan()">
                <span>📋</span>
                <span>计划</span>
            </div>
            <div class="nav-item" onclick="goToProfile()">
                <span>👤</span>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script>
        function goToHome() { window.location.href = 'index.html'; }
        function goToPlan() { window.location.href = 'plan.html'; }
        function goToProfile() { window.location.href = 'profile.html'; }
        function showAddWorkout() { alert('📝 添加运动记录功能\n\n选择运动类型：\n- 跑步\n- 力量训练\n- 瑜伽\n- 有氧'); }

        // 时间筛选数据
        const timeData = {
            day: {
                stats: { count: '2', duration: '1h', calories: '520' },
                bars: [0, 0, 0, 0, 0, 60, 80]
            },
            week: {
                stats: { count: '8', duration: '5.5h', calories: '1,890' },
                bars: [40, 60, 30, 80, 70, 90, 50]
            },
            month: {
                stats: { count: '23', duration: '14.5h', calories: '5,890' },
                bars: [45, 70, 55, 80, 65, 95, 75]
            }
        };

        function setTimeFilter(type) {
            // 更新时间筛选按钮状态
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 更新统计数据
            const data = timeData[type];
            const statValues = document.querySelectorAll('.stat-value');
            statValues[0].textContent = data.stats.count;
            statValues[1].textContent = data.stats.duration;
            statValues[2].textContent = data.stats.calories;

            // 更新图表
            const bars = document.querySelectorAll('.bar');
            bars.forEach((bar, index) => {
                bar.style.height = data.bars[index] + '%';
            });

            // 更新图表标签
            const labels = document.querySelectorAll('.bar-label');
            if (type === 'month') {
                const monthLabels = ['第1周', '第2周', '第3周', '第4周'];
                labels.forEach((label, i) => {
                    label.textContent = i < 4 ? monthLabels[i] : '';
                });
            } else {
                const weekLabels = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                labels.forEach((label, i) => {
                    label.textContent = weekLabels[i];
                });
            }
        }
    </script>
</body>

</html>

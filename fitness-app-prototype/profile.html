<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身APP - 个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .container { max-width: 400px; margin: 0 auto; background: #16213e; min-height: 100vh; }
        header { background: linear-gradient(135deg, #e94560, #ff6b35); padding: 40px 20px 60px; }
        .profile-header { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .user-info { flex: 1; }
        .user-name { font-size: 20px; font-weight: 600; }
        .user-level { display: inline-block; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 12px; margin-top: 8px; }
        .stats-row { display: flex; justify-content: space-around; background: rgba(0,0,0,0.2); margin: -30px 15px 15px; border-radius: 16px; padding: 20px; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 24px; font-weight: 700; color: #fff; }
        .stat-name { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
        .menu-section { padding: 15px; }
        .menu-title { font-size: 14px; color: #888; margin-bottom: 10px; }
        .menu-list { background: #0f3460; border-radius: 12px; overflow: hidden; }
        .menu-item { display: flex; align-items: center; padding: 15px; cursor: pointer; transition: background 0.2s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-icon { width: 36px; height: 36px; background: rgba(233, 69, 96, 0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 15px; }
        .menu-text { flex: 1; }
        .menu-label { font-size: 16px; }
        .menu-desc { font-size: 12px; color: #888; margin-top: 2px; }
        .menu-arrow { color: #666; font-size: 18px; }
        .water-section { padding: 15px; }
        .water-card { background: linear-gradient(135deg, #4facfe, #00f2fe); border-radius: 16px; padding: 20px; }
        .water-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .water-title { font-size: 18px; font-weight: 600; }
        .water-progress { display: flex; align-items: center; gap: 10px; }
        .progress-circle { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; }
        .progress-text { font-size: 14px; font-weight: 600; }
        .water-bar { background: rgba(255,255,255,0.3); border-radius: 8px; height: 8px; overflow: hidden; }
        .water-fill { background: #fff; height: 100%; border-radius: 8px; }
        .water-stats { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f3460; display: flex; justify-content: space-around; padding: 15px 0; max-width: 400px; margin: 0 auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; }
        .nav-item.active { color: #e94560; }
        .nav-item span { font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="profile-header">
                <div class="avatar">👤</div>
                <div class="user-info">
                    <div class="user-name">健身达人</div>
                    <div class="user-level">Lv.12 运动健将</div>
                </div>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num">256</div>
                <div class="stat-name">运动天数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">128h</div>
                <div class="stat-name">运动时长</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">52kg</div>
                <div class="stat-name">累计减重</div>
            </div>
        </div>

        <div class="water-section">
            <div class="water-card">
                <div class="water-header">
                    <div class="water-title">💧 今日饮水</div>
                    <div class="water-progress">
                        <div class="progress-circle">40%</div>
                    </div>
                </div>
                <div class="water-bar">
                    <div class="water-fill" style="width: 40%;"></div>
                </div>
                <div class="water-stats">
                    <span>已喝 800ml</span>
                    <span>目标 2000ml</span>
                </div>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-title">运动相关</div>
            <div class="menu-list">
                <div class="menu-item" onclick="goToBodyData()">
                    <div class="menu-icon">📊</div>
                    <div class="menu-text">
                        <div class="menu-label">身体数据</div>
                        <div class="menu-desc">体重、体脂率记录</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
                <div class="menu-item" onclick="goToPlank()">
                    <div class="menu-icon">🤸</div>
                    <div class="menu-text">
                        <div class="menu-label">平板支撑</div>
                        <div class="menu-desc">挑战自我，突破极限</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
                <div class="menu-item" onclick="showReminderSettings()">
                    <div class="menu-icon">⏰</div>
                    <div class="menu-text">
                        <div class="menu-label">提醒设置</div>
                        <div class="menu-desc">喝水提醒、运动提醒</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
            </div>
        </div>

        <div class="menu-section" style="margin-bottom: 80px;">
            <div class="menu-title">其他</div>
            <div class="menu-list">
                <div class="menu-item" onclick="showSettings()">
                    <div class="menu-icon">⚙️</div>
                    <div class="menu-text">
                        <div class="menu-label">设置</div>
                        <div class="menu-desc">个性化配置</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
                <div class="menu-item" onclick="showAbout()">
                    <div class="menu-icon">ℹ️</div>
                    <div class="menu-text">
                        <div class="menu-label">关于我们</div>
                        <div class="menu-desc">版本信息</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item" onclick="goToHome()">
                <span>🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="goToWorkout()">
                <span>🏃</span>
                <span>运动</span>
            </div>
            <div class="nav-item" onclick="goToPlan()">
                <span>📋</span>
                <span>计划</span>
            </div>
            <div class="nav-item active">
                <span>👤</span>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script>
        function goToHome() { window.location.href = 'index.html'; }
        function goToWorkout() { window.location.href = 'workout.html'; }
        function goToPlan() { window.location.href = 'plan.html'; }
        function goToBodyData() { window.location.href = 'bodydata.html'; }
        function goToPlank() { window.location.href = 'plank.html'; }
        function showReminderSettings() { alert('⏰ 提醒设置\n\n喝水提醒: 已开启 (每30分钟)\n运动提醒: 未开启'); }
        function showSettings() { alert('⚙️ 设置\n\n深色模式: 开启\n声音: 开启\n振动: 开启'); }
        function showAbout() { alert('ℹ️ 健身助手 v1.0.0\n\n专为健身爱好者打造的个人助手'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身APP - 身体数据</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
        .container { max-width: 400px; margin: 0 auto; background: #16213e; min-height: 100vh; }
        header { background: linear-gradient(135deg, #e94560, #ff6b35); padding: 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        header h1 { font-size: 20px; font-weight: 600; }
        .current-data { padding: 20px; }
        .data-card { background: linear-gradient(135deg, #0f3460, #1a4d8c); border-radius: 16px; padding: 25px; text-align: center; }
        .data-value { font-size: 48px; font-weight: 300; color: #fff; }
        .data-unit { font-size: 16px; color: #aaa; }
        .data-label { font-size: 14px; color: #aaa; margin-top: 10px; }
        .change-indicator { margin-top: 15px; padding: 10px; border-radius: 8px; display: inline-block; }
        .change-indicator.positive { background: rgba(79, 172, 254, 0.2); color: #4facfe; }
        .change-indicator.negative { background: rgba(233, 69, 96, 0.2); color: #e94560; }
        .data-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .small-card { background: #0f3460; border-radius: 12px; padding: 15px; text-align: center; }
        .small-value { font-size: 20px; font-weight: 600; color: #e94560; }
        .small-label { font-size: 12px; color: #aaa; margin-top: 4px; }
        .chart-section { padding: 15px; }
        .chart-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        .chart-container { background: #0f3460; border-radius: 12px; padding: 20px; }
        .chart-bars { display: flex; justify-content: space-between; align-items: flex-end; height: 150px; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .bar { width: 24px; background: linear-gradient(180deg, #e94560, #ff6b35); border-radius: 4px 4px 0 0; margin-bottom: 8px; transition: height 0.5s; }
        .bar-label { font-size: 10px; color: #888; }
        .add-btn { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #e94560, #ff6b35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4); }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f3460; display: flex; justify-content: space-around; padding: 15px 0; max-width: 400px; margin: 0 auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; }
        .nav-item.active { color: #e94560; }
        .nav-item span { font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="back-btn" onclick="goToHome()">←</div>
            <h1>身体数据</h1>
        </header>

        <div class="current-data">
            <div class="data-card">
                <div style="display: flex; justify-content: center; align-items: baseline; gap: 5px;">
                    <span class="data-value">72.5</span>
                    <span class="data-unit">kg</span>
                </div>
                <div class="data-label">当前体重</div>
                <div class="change-indicator positive">
                    ↓ 2.3kg（本月）
                </div>
            </div>
        </div>

        <div class="data-cards">
            <div class="small-card">
                <div class="small-value">18.5%</div>
                <div class="small-label">体脂率</div>
            </div>
            <div class="small-card">
                <div class="small-value">175cm</div>
                <div class="small-label">身高</div>
            </div>
            <div class="small-card">
                <div class="small-value">23.5</div>
                <div class="small-label">BMI</div>
            </div>
            <div class="small-card">
                <div class="small-value">70kg</div>
                <div class="small-label">目标体重</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-title">📈 体重变化趋势</div>
            <div class="chart-container">
                <div class="chart-bars">
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 70%;"></div>
                        <div class="bar-label">周一</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 75%;"></div>
                        <div class="bar-label">周二</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 72%;"></div>
                        <div class="bar-label">周三</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 68%;"></div>
                        <div class="bar-label">周四</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 65%;"></div>
                        <div class="bar-label">周五</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 62%;"></div>
                        <div class="bar-label">周六</div>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="height: 60%;"></div>
                        <div class="bar-label">周日</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="padding: 15px; margin-bottom: 120px;">
            <div class="chart-title">📅 近期记录</div>
            <div style="background: #0f3460; border-radius: 12px; overflow: hidden;">
                <div style="display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <span style="font-size: 14px;">6月12日</span>
                    <span style="font-size: 14px; color: #e94560;">72.5kg</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <span style="font-size: 14px;">6月11日</span>
                    <span style="font-size: 14px; color: #e94560;">72.8kg</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <span style="font-size: 14px;">6月10日</span>
                    <span style="font-size: 14px; color: #e94560;">73.1kg</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 15px;">
                    <span style="font-size: 14px;">6月9日</span>
                    <span style="font-size: 14px; color: #e94560;">73.5kg</span>
                </div>
            </div>
        </div>

        <div class="add-btn" onclick="showAddData()">+</div>

        <div class="nav-bar">
            <div class="nav-item" onclick="goToHome()">
                <span>🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="goToWorkout()">
                <span>🏃</span>
                <span>运动</span>
            </div>
            <div class="nav-item" onclick="goToPlan()">
                <span>📋</span>
                <span>计划</span>
            </div>
            <div class="nav-item" onclick="goToProfile()">
                <span>👤</span>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script>
        function goToHome() { window.location.href = 'index.html'; }
        function goToWorkout() { window.location.href = 'workout.html'; }
        function goToPlan() { window.location.href = 'plan.html'; }
        function goToProfile() { window.location.href = 'profile.html'; }
        function showAddData() { alert('📝 添加身体数据\n\n体重: ____ kg\n体脂率: ____ %'); }
    </script>
</body>
</html>
